<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PPAP — Password Hash Generator</title>
<style>body{font-family:system-ui,sans-serif;background:#0e131a;color:#e6edf5;max-width:560px;margin:40px auto;padding:0 16px}
input,button{font:inherit;padding:10px;border-radius:8px;border:1px solid #2a3645;background:#1a2330;color:#e6edf5;width:100%;box-sizing:border-box;margin:6px 0}
button{background:#2f7df6;border-color:#2f7df6;cursor:pointer;font-weight:600}
code{display:block;background:#000;padding:12px;border-radius:8px;word-break:break-all;margin-top:10px;font-size:13px}
small{color:#8b9bb0}</style></head>
<body>
<h2>PPAP — Password Hash Generator</h2>
<p><small>Generates the same PBKDF2-SHA256 <code>salt$hash</code> that worker.js verifies. Use it to seed users into D1.</small></p>
<input id="u" placeholder="username (e.g. admin)">
<input id="p" placeholder="plain password">
<button onclick="gen()">Generate hash + SQL</button>
<code id="out">—</code>
<script>
const enc = new TextEncoder();
const b64u = b => btoa(String.fromCharCode(...new Uint8Array(b))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
async function hashPassword(password){
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const key = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'}, key, 256);
  return b64u(salt)+'$'+b64u(bits);
}
async function gen(){
  const u=document.getElementById('u').value.trim()||'admin';
  const p=document.getElementById('p').value||'changeme';
  const h=await hashPassword(p);
  const id='u_'+Date.now().toString(36);
  document.getElementById('out').textContent =
    `INSERT INTO users (id,username,password_hash,name,role) VALUES ('${id}','${u}','${h}','${u}','admin');`;
}
</script>
</body></html>
